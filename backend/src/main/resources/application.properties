# Configurações do Servidor
server.port=8080
server.servlet.context-path=/api

# Configurações do Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Configurações do Banco de Dados
# Para desenvolvimento (H2)
spring.datasource.url=jdbc:h2:mem:cortexai
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Para produção (PostgreSQL)
# spring.datasource.url=jdbc:postgresql://localhost:5432/cortexai
# spring.datasource.username=postgres
# spring.datasource.password=sua-senha
# spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (apenas desenvolvimento)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
jwt.secret=cortexai-secret-key-very-long-and-secure-key-for-jwt-token-generation
jwt.expiration=86400000

# IA Própria CortexAI
# Não precisa de configurações - usa rede neural interna

# CORS
cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Logging
logging.level.com.cortexai=DEBUG
logging.level.org.springframework.security=DEBUG
